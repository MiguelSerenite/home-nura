<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg6)" rx="24"/>
  <!-- Wide dual zone body -->
  <rect x="110" y="110" width="280" height="250" rx="25" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  <!-- Display panel -->
  <rect x="180" y="125" width="140" height="45" rx="10" fill="#475569"/>
  <circle cx="220" cy="148" r="8" fill="#3b82f6" opacity="0.8"/>
  <circle cx="250" cy="148" r="8" fill="#3b82f6" opacity="0.6"/>
  <circle cx="280" cy="148" r="8" fill="#3b82f6" opacity="0.4"/>
  <!-- Dual drawers with divider -->
  <rect x="125" y="185" width="120" height="155" rx="15" fill="#b0bec5" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="255" y="185" width="120" height="155" rx="15" fill="#b0bec5" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Drawer handles -->
  <rect x="160" y="195" width="50" height="8" rx="4" fill="#94a3b8"/>
  <rect x="290" y="195" width="50" height="8" rx="4" fill="#94a3b8"/>
  <!-- Vent lines -->
  <line x1="145" y1="260" x2="225" y2="260" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <line x1="275" y1="260" x2="355" y2="260" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <!-- Base -->
  <rect x="140" y="365" width="220" height="16" rx="8" fill="#94a3b8" opacity="0.5"/>
  <!-- Badge -->
  <rect x="115" y="82" width="90" height="24" rx="12" fill="#3b82f6"/>
  <text x="160" y="99" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">10.4L</text>
  <!-- Product name -->
  <text x="250" y="425" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#334155">Ninja FlexDrawer</text>
  <text x="250" y="450" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#64748b">Dual Zone 10.4L</text>
</svg>