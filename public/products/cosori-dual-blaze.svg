<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg3)" rx="24"/>
  <!-- Modern square airfryer body -->
  <rect x="155" y="100" width="190" height="260" rx="25" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  <!-- Touch display -->
  <rect x="195" y="120" width="110" height="60" rx="12" fill="#475569"/>
  <circle cx="220" cy="150" r="8" fill="#3b82f6" opacity="0.8"/>
  <circle cx="250" cy="150" r="8" fill="#3b82f6" opacity="0.5"/>
  <circle cx="280" cy="150" r="8" fill="#3b82f6" opacity="0.3"/>
  <!-- Drawer -->
  <rect x="165" y="200" width="170" height="140" rx="15" fill="#b0bec5" stroke="#94a3b8" stroke-width="1.5"/>
  <!-- Drawer handle -->
  <rect x="220" y="210" width="60" height="10" rx="5" fill="#94a3b8"/>
  <!-- Vent pattern -->
  <line x1="185" y1="260" x2="315" y2="260" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="185" y1="275" x2="315" y2="275" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <line x1="185" y1="290" x2="315" y2="290" stroke="#94a3b8" stroke-width="1" opacity="0.5"/>
  <!-- Base -->
  <rect x="170" y="365" width="160" height="14" rx="7" fill="#94a3b8" opacity="0.5"/>
  <!-- Badge -->
  <rect x="155" y="72" width="80" height="24" rx="12" fill="#3b82f6"/>
  <text x="195" y="89" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">6.4L</text>
  <!-- Product name -->
  <text x="250" y="425" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#334155">Cosori Dual Blaze</text>
  <text x="250" y="450" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#64748b">Smart Air Fryer</text>
</svg>
