<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg9)" rx="24"/>
  <!-- Medium body with rounded shape -->
  <rect x="165" y="110" width="170" height="255" rx="28" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  <!-- Digital display -->
  <rect x="195" y="130" width="110" height="50" rx="10" fill="#475569"/>
  <!-- Program icons row -->
  <circle cx="215" cy="200" r="7" fill="#94a3b8"/>
  <circle cx="240" cy="200" r="7" fill="#94a3b8"/>
  <circle cx="265" cy="200" r="7" fill="#94a3b8"/>
  <circle cx="290" cy="200" r="7" fill="#94a3b8"/>
  <!-- Drawer -->
  <rect x="178" y="220" width="144" height="125" rx="16" fill="#b0bec5" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="220" y="232" width="60" height="9" rx="4.5" fill="#94a3b8"/>
  <!-- Vent lines -->
  <line x1="195" y1="290" x2="305" y2="290" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <line x1="195" y1="305" x2="305" y2="305" stroke="#94a3b8" stroke-width="1" opacity="0.4"/>
  <!-- Base -->
  <rect x="180" y="370" width="140" height="14" rx="7" fill="#94a3b8" opacity="0.5"/>
  <!-- Badge -->
  <rect x="160" y="80" width="60" height="24" rx="12" fill="#3b82f6"/>
  <text x="190" y="97" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">5L</text>
  <!-- Product name -->
  <text x="250" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#334155">Moulinex</text>
  <text x="250" y="455" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#64748b">Easy Fry Max 5L</text>
</svg>