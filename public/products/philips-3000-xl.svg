<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg2)" rx="24"/>
  <!-- Classic round airfryer body -->
  <ellipse cx="250" cy="250" rx="120" ry="130" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  <!-- Top lid -->
  <ellipse cx="250" cy="140" rx="100" ry="30" fill="#b0bec5" stroke="#94a3b8" stroke-width="2"/>
  <!-- Handle on top -->
  <rect x="220" y="100" width="60" height="14" rx="7" fill="#94a3b8"/>
  <!-- Display panel -->
  <rect x="210" y="200" width="80" height="50" rx="10" fill="#475569"/>
  <circle cx="250" cy="225" r="15" fill="#334155" stroke="#64748b" stroke-width="1"/>
  <!-- Drawer line -->
  <line x1="160" y1="300" x2="340" y2="300" stroke="#94a3b8" stroke-width="2"/>
  <!-- Drawer handle -->
  <rect x="220" y="310" width="60" height="10" rx="5" fill="#94a3b8"/>
  <!-- Base -->
  <rect x="170" y="370" width="160" height="16" rx="8" fill="#94a3b8" opacity="0.5"/>
  <!-- Badge -->
  <rect x="155" y="70" width="80" height="24" rx="12" fill="#3b82f6"/>
  <text x="195" y="87" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">6.2L</text>
  <!-- Product name -->
  <text x="250" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#334155">Philips 3000 XL</text>
  <text x="250" y="455" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#64748b">Airfryer Series</text>
</svg>
