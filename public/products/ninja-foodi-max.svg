<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg1)" rx="24"/>
  <!-- Airfryer body - dual stack design -->
  <rect x="150" y="80" width="200" height="140" rx="20" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  <rect x="150" y="230" width="200" height="140" rx="20" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  <!-- Handle -->
  <rect x="170" y="105" width="160" height="12" rx="6" fill="#94a3b8"/>
  <rect x="170" y="255" width="160" height="12" rx="6" fill="#94a3b8"/>
  <!-- Display -->
  <rect x="200" y="130" width="100" height="30" rx="8" fill="#475569"/>
  <rect x="200" y="280" width="100" height="30" rx="8" fill="#475569"/>
  <!-- Vent lines -->
  <line x1="190" y1="175" x2="310" y2="175" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="190" y1="185" x2="310" y2="185" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="190" y1="325" x2="310" y2="325" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <line x1="190" y1="335" x2="310" y2="335" stroke="#94a3b8" stroke-width="1.5" opacity="0.5"/>
  <!-- Base -->
  <rect x="160" y="370" width="180" height="20" rx="10" fill="#94a3b8" opacity="0.5"/>
  <!-- Badge -->
  <rect x="155" y="62" width="80" height="24" rx="12" fill="#3b82f6"/>
  <text x="195" y="79" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">9.5L</text>
  <!-- Product name -->
  <text x="250" y="430" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#334155">Ninja Foodi MAX</text>
  <text x="250" y="455" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#64748b">Double Stack XL</text>
</svg>
