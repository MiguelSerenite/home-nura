<svg xmlns="http://www.w3.org/2000/svg" width="500" height="500" viewBox="0 0 500 500">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f8fafc"/>
      <stop offset="100%" stop-color="#f1f5f9"/>
    </linearGradient>
  </defs>
  <rect width="500" height="500" fill="url(#bg5)" rx="24"/>
  <!-- Compact cylindrical body -->
  <rect x="175" y="120" width="150" height="240" rx="30" fill="#cbd5e1" stroke="#94a3b8" stroke-width="2"/>
  <!-- OLED display -->
  <rect x="205" y="145" width="90" height="45" rx="10" fill="#1e293b"/>
  <text x="250" y="175" text-anchor="middle" font-family="Arial,sans-serif" font-size="20" font-weight="bold" fill="#3b82f6">180°</text>
  <!-- Touch buttons -->
  <circle cx="225" cy="210" r="6" fill="#475569"/>
  <circle cx="250" cy="210" r="6" fill="#475569"/>
  <circle cx="275" cy="210" r="6" fill="#475569"/>
  <!-- Drawer -->
  <rect x="185" y="235" width="130" height="110" rx="15" fill="#b0bec5" stroke="#94a3b8" stroke-width="1.5"/>
  <rect x="225" y="245" width="50" height="8" rx="4" fill="#94a3b8"/>
  <!-- Base -->
  <rect x="185" y="365" width="130" height="14" rx="7" fill="#94a3b8" opacity="0.5"/>
  <!-- Badge -->
  <rect x="155" y="90" width="60" height="24" rx="12" fill="#3b82f6"/>
  <text x="185" y="107" text-anchor="middle" font-family="Arial,sans-serif" font-size="11" font-weight="bold" fill="white">4L</text>
  <!-- Product name -->
  <text x="250" y="425" text-anchor="middle" font-family="Arial,sans-serif" font-size="18" font-weight="bold" fill="#334155">Xiaomi Smart</text>
  <text x="250" y="450" text-anchor="middle" font-family="Arial,sans-serif" font-size="14" fill="#64748b">Air Fryer Pro 4L</text>
</svg>