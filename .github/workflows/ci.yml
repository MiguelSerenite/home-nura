name: CI

# Runs the four quality suites (unit / lint / smoke / a11y / perf)
# on every PR and on pushes to main. Regressions that slipped past a
# local run are caught here before merge.
#
# Jobs:
#   1. unit — fast path: lint + vitest (~30s wall clock)
#   2. e2e-perf — build-heavy path: next build once, then Playwright
#      (smoke + a11y) and Lighthouse CI with CWV budgets
#
# Both jobs run in parallel on the same commit.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs on the same ref when a new push arrives.
# Keeps the queue short on fast iteration.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_TELEMETRY_DISABLED: "1"
  # Avoid ANSI colour sequences in CI logs — easier to read diffs
  FORCE_COLOR: "0"

jobs:
  unit:
    name: Lint + unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Vitest
        run: npm run test

      # Phase W: fail the build on high/critical CVEs in production deps.
      # Dev deps are excluded so a transitive dev-only advisory (eslint,
      # vitest, etc.) can't block a merge — those still surface via
      # Dependabot grouped PRs.
      - name: npm audit (production deps, high+)
        run: npm run audit:prod

  e2e-perf:
    name: E2E (smoke + a11y) + Lighthouse
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      # Cache Playwright browser binaries between runs. The cache key
      # is pinned to the @playwright/test version so a bump invalidates
      # it automatically.
      - name: Get Playwright version
        id: playwright-version
        run: |
          PW_VERSION=$(node -p "require('./package-lock.json').packages['node_modules/@playwright/test'].version")
          echo "version=$PW_VERSION" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps only (cached browsers)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      # Lighthouse CI needs a system Chrome. Use the action's
      # bundled stable build rather than pointing LHCI at Playwright's
      # chromium (avoids version drift surprises).
      - name: Setup Chrome for Lighthouse
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Next.js build
        run: npm run build

      - name: Playwright (smoke + a11y)
        run: npx playwright test --reporter=list

      - name: Lighthouse CI
        run: npm run lhci

      # Upload Playwright report only on failure — gives maintainers a
      # trace.zip to replay the broken scenario locally.
      # LHCI already uploads its reports to temporary-public-storage
      # (URLs are printed in the job log), so no GHA artefact for it.
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
